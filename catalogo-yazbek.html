<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo Yazbek - Playeras y ropa básica de alta demanda">
    <title>Catálogo Yazbek | Katalogoss</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .pdf-viewer-container {
            max-width: 100%;
            padding: 20px;
            background: var(--dark-color);
            min-height: 100vh;
        }

        .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: linear-gradient(90deg, rgba(10, 14, 39, 0.95), rgba(26, 31, 58, 0.95));
            border-bottom: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .pdf-header h1 {
            color: var(--neon-pink);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(0, 255, 255, 0.4);
            font-size: 2rem;
        }

        .pdf-frame-wrapper {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .pdf-frame {
            width: 90%;
            max-width: 1000px;
            height: 800px;
            border: 2px solid var(--neon-cyan);
            border-radius: 0;
            background: var(--light-color);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
        }

        @media (max-width: 768px) {
            .pdf-header {
                flex-direction: column;
                gap: 1rem;
            }

            .pdf-header h1 {
                font-size: 1.5rem;
            }

            .pdf-frame {
                height: 500px;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <!-- Navegación -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="Katalogoss - Logo">
            </div>
            <a href="index.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Regresar</a>
        </div>
    </nav>

    <!-- Contenedor del PDF -->
    <div class="pdf-viewer-container">
        <div class="container">
            <div class="pdf-header">
                <h1>Catálogo Yazbek</h1>
                <p style="color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0, 245, 255, 0.6);">Playeras y ropa básica de alta demanda</p>
            </div>

            <div class="pdf-frame-wrapper">
                <iframe 
                    src="catalogs/yazbek.pdf"
                    class="pdf-frame"
                    title="Catálogo Yazbek">
                </iframe>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="catalogs/yazbek.pdf" class="btn btn-secondary" download>
                    <i class="fas fa-download"></i> Descargar PDF
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
